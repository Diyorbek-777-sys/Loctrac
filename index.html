<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;600;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1520;
    --border: #1e2d42;
    --accent: #00e5ff;
    --accent2: #ff3d6b;
    --text: #c8daf0;
    --muted: #4a6280;
    --green: #00ff88;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Space Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 28px 16px 60px; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: clamp(24px,6vw,42px); font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
  .ping { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 5px; animation: ping 1.5s infinite; }
  @keyframes ping { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-bottom: 14px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .ct { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
  label { display: block; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  input[type="text"], input[type="password"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 11px 13px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px; outline: none; transition: border-color .2s; margin-bottom: 12px; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 12px; border: none; border-radius: 7px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; }
  .btn-p { background: var(--accent); color: var(--bg); }
  .btn-p:hover { opacity: .85; }
  .btn-p:active { transform: scale(.98); }

  .link-box { display: flex; gap: 8px; align-items: center; background: var(--bg); border: 1px solid var(--accent); border-radius: 6px; padding: 10px 12px; margin-top: 12px; }
  .link-text { flex: 1; font-size: 11px; color: var(--accent); word-break: break-all; line-height: 1.5; }
  .cbtn { flex-shrink: 0; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; padding: 7px 11px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; cursor: pointer; }

  .loc-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 13px; margin-bottom: 9px; animation: fi .3s ease; }
  @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .ln { font-family:'Unbounded',sans-serif; font-size:12px; font-weight:600; margin-bottom:4px; }
  .la { font-size:12px; color:var(--green); margin-bottom:3px; }
  .lc { font-size:11px; color:var(--accent); margin-bottom:3px; }
  .lt { font-size:10px; color:var(--muted); }
  .lact { display:flex; gap:6px; margin-top:9px; flex-wrap:wrap; }
  .bsm { padding:5px 11px; border-radius:5px; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; cursor:pointer; border:none; text-decoration:none; display:inline-flex; align-items:center; }
  .bmap { background:rgba(0,229,255,.12); color:var(--accent); border:1px solid rgba(0,229,255,.25); }
  .bdel { background:rgba(255,61,107,.12); color:var(--accent2); border:1px solid rgba(255,61,107,.25); }

  .badge { display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:20px; font-size:11px; font-weight:700; }
  .bg { background:rgba(0,255,136,.1); color:var(--green); border:1px solid rgba(0,255,136,.3); }
  .bb { background:rgba(0,229,255,.1); color:var(--accent); border:1px solid rgba(0,229,255,.3); }
  .br { background:rgba(255,61,107,.1); color:var(--accent2); border:1px solid rgba(255,61,107,.3); }

  .empty { text-align:center; padding:28px; color:var(--muted); font-size:12px; }
  .rrow { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .rbtN { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:5px; padding:5px 10px; font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; }
  .rbtN:hover { border-color:var(--accent); color:var(--accent); }

  /* PASSWORD SCREEN */
  .pwscreen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .pwbox { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:30px 22px; width:100%; max-width:340px; text-align:center; position:relative; overflow:hidden; }
  .pwbox::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--accent), var(--accent2)); }
  .pwtitle { font-family:'Unbounded',sans-serif; font-size:20px; font-weight:900; margin-bottom:6px; background:linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .pwdesc { color:var(--muted); font-size:11px; margin-bottom:20px; line-height:1.6; }

  /* RECEIVER */
  .recscreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .recbox { text-align:center; max-width:320px; width:100%; }
  .ricon { font-size:68px; animation:flt 3s ease-in-out infinite; margin-bottom:18px; }
  @keyframes flt { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .rtitle { font-family:'Unbounded',sans-serif; font-size:clamp(16px,5vw,26px); font-weight:900; margin-bottom:10px; }
  .rdesc { color:var(--muted); font-size:12px; line-height:1.7; margin-bottom:24px; }
  .rsender { color:var(--accent); font-weight:700; }
</style>
</head>
<body>

<!-- PASSWORD -->
<div class="pwscreen" id="pwScreen">
  <div class="pwbox">
    <div class="pwtitle">📡 LocTrack</div>
    <div class="pwdesc">Shaxsiy lokatsiya panelingiz. Kirish uchun parol kiriting.</div>
    <input type="password" id="pwInput" placeholder="Parol...">
    <button class="btn btn-p" onclick="login()">🔑 Kirish</button>
    <div id="pwErr" style="display:none;margin-top:10px;font-size:11px;color:var(--accent2);">❌ Noto'g'ri parol</div>
  </div>
</div>

<!-- OWNER PANEL -->
<div id="ownerPanel" style="display:none;">
  <div class="wrap">
    <div class="logo">📡 LocTrack</div>
    <div class="sub"><span class="ping"></span>Sizning Panelingiz</div>

    <div class="card">
      <div class="ct">🔗 Link Yaratish</div>
      <label>Do'stingiz ismi</label>
      <input type="text" id="nameInput" placeholder="Masalan: Ali, Dilnoza...">
      <button class="btn btn-p" onclick="genLink()">⚡ Link Yaratish</button>
      <div id="linkBox" style="display:none;">
        <div class="link-box">
          <span class="link-text" id="linkText"></span>
          <button class="cbtn" onclick="copyLink()">📋</button>
        </div>
        <div style="margin-top:7px;font-size:11px;color:var(--muted);">✅ Telegram yoki WhatsApp ga yuboring</div>
      </div>
    </div>

    <div class="card">
      <div class="ct">📥 Lokatsiyalar</div>
      <div class="rrow">
        <span id="locCnt" style="font-size:11px;color:var(--muted);">0 ta</span>
        <button class="rbtN" onclick="loadLocs()">🔄 Yangilash</button>
      </div>
      <div id="locList"><div class="empty">⏳ Yuklanmoqda...</div></div>
    </div>

    <div class="card">
      <div class="ct">🔐 Parol</div>
      <label>Yangi Parol</label>
      <input type="text" id="newPw" placeholder="Yangi parol...">
      <button class="btn btn-p" onclick="changePw()">💾 Saqlash</button>
      <div id="pwOk" style="display:none;margin-top:8px;font-size:11px;color:var(--green);">✅ Saqlandi!</div>
    </div>
  </div>
</div>

<!-- RECEIVER -->
<div id="recPanel" style="display:none;">
  <div class="recscreen">
    <div class="recbox">
      <div class="ricon" id="recIcon">📍</div>
      <div class="rtitle">Jonli Kuzatuv</div>
      <div class="rdesc"><span class="rsender" id="recSender"></span> sizning joylashuvingizni kuzatmoqchi.</div>
      <button class="btn btn-p" style="max-width:280px;margin:0 auto 16px;" id="startBtn" onclick="startTracking()">▶️ Kuzatuvni Boshlash</button>
      <button class="btn" style="max-width:280px;margin:0 auto 16px;background:var(--accent2);color:#fff;display:none;" id="stopBtn" onclick="stopTracking()">⏹️ To'xtatish</button>
      <div id="recStatus"></div>
    </div>
  </div>
</div>

<script>
// ═══ CONFIG ═══
const BIN_ID = '6a1d20e821f9ee59d2a3ab1c';
const API_KEY = '$2a$10$utcZkXccFLM77/vZp3Ogke8/ZbIEDFerbVgcm0y9aC45RQPeprPLu';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const PASS_KEY = 'lct_pass';
const DEFAULT_PASS = 'admin123';
const BASE = window.location.href.split('?')[0];

// ═══ INIT ═══
function init() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('mode') === 'track') {
    document.getElementById('pwScreen').style.display = 'none';
    document.getElementById('recPanel').style.display = 'block';
    document.getElementById('recSender').textContent = decodeURIComponent(p.get('label') || 'Do\'stingiz');
    window._owner = p.get('owner') || '';
  }
}

// ═══ LOGIN ═══
function login() {
  const pw = document.getElementById('pwInput').value;
  const saved = localStorage.getItem(PASS_KEY) || DEFAULT_PASS;
  if (pw === saved) {
    document.getElementById('pwScreen').style.display = 'none';
    document.getElementById('ownerPanel').style.display = 'block';
    loadLocs();
  } else {
    const e = document.getElementById('pwErr');
    e.style.display = 'block';
    setTimeout(() => e.style.display = 'none', 2000);
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function changePw() {
  const v = document.getElementById('newPw').value.trim();
  if (!v) return;
  localStorage.setItem(PASS_KEY, v);
  document.getElementById('newPw').value = '';
  const ok = document.getElementById('pwOk');
  ok.style.display = 'block';
  setTimeout(() => ok.style.display = 'none', 2000);
}

// ═══ GENERATE LINK ═══
function genLink() {
  const name = document.getElementById('nameInput').value.trim() || 'Do\'stim';
  const oid = localStorage.getItem('lct_oid') || (() => {
    const id = 'O' + Date.now();
    localStorage.setItem('lct_oid', id);
    return id;
  })();
  const link = `${BASE}?mode=track&owner=${oid}&label=${encodeURIComponent(name)}`;
  document.getElementById('linkText').textContent = link;
  document.getElementById('linkBox').style.display = 'block';
}

function copyLink() {
  const t = document.getElementById('linkText').textContent;
  const ta = document.createElement('textarea');
  ta.value = t;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    const b = document.querySelector('.cbtn');
    b.textContent = '✅';
    setTimeout(() => b.textContent = '📋', 2000);
  } catch { prompt('Nusxalang:', t); }
  document.body.removeChild(ta);
}

// ═══ LOAD LOCATIONS ═══
async function loadLocs() {
  try {
    const r = await fetch(API_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    const d = await r.json();
    const locs = (d.record && d.record.locations) ? d.record.locations : [];
    renderLocs(locs);
  } catch(e) {
    document.getElementById('locList').innerHTML = '<div class="empty">❌ Yuklab bo\'lmadi</div>';
  }
}

function renderLocs(locs) {
  document.getElementById('locCnt').textContent = locs.length + ' ta lokatsiya';
  if (!locs.length) {
    document.getElementById('locList').innerHTML = '<div class="empty">🌐 Hali hech kim link bosmagan</div>';
    return;
  }
  document.getElementById('locList').innerHTML = locs.slice().reverse().map(loc => {
    const t = new Date(loc.time).toLocaleString('uz-UZ', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const mUrl = `https://www.google.com/maps?q=${loc.lat},${loc.lng}`;
    return `<div class="loc-item">
      <div class="ln">👤 ${esc(loc.sender)}</div>
      ${loc.address ? `<div class="la">🏙️ ${esc(loc.address)}</div>` : ''}
      <div class="lc">📍 ${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}</div>
      <div class="lt">🕐 ${t}${loc.accuracy ? ` · ±${loc.accuracy}m` : ''}</div>
      <div class="lact">
        <a href="${mUrl}" target="_blank" class="bsm bmap">🗺️ Xarita</a>
        <button onclick="delLoc('${loc.id}')" class="bsm bdel">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

async function delLoc(id) {
  try {
    const r = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
    const d = await r.json();
    let locs = d.record.locations || [];
    locs = locs.filter(l => l.id !== id);
    await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ locations: locs })
    });
    renderLocs(locs);
    document.getElementById('locCnt').textContent = locs.length + ' ta lokatsiya';
  } catch(e) {}
}

// ═══ LIVE TRACKING ═══
let watchId = null;
let trackCount = 0;
let lastSent = 0;
const SEND_INTERVAL = 30000; // 30 soniya
const SENDER_NAME = () => decodeURIComponent(new URLSearchParams(window.location.search).get('label') || 'Noma\'lum');

function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById('recStatus').innerHTML = '<span class="badge br">❌ GPS qo\'llab-quvvatlanmaydi</span>';
    return;
  }
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'flex';
  document.getElementById('recIcon').textContent = '🟢';
  document.getElementById('recStatus').innerHTML = '<span class="badge bb">⏳ GPS aniqlanmoqda... (1 marta ruxsat bering)</span>';

  // watchPosition — 1 marta ruxsat, doimiy kuzatadi
  watchId = navigator.geolocation.watchPosition(
    async pos => {
      const now = Date.now();
      // Faqat har 30 soniyada serverga yuborish
      if (now - lastSent < SEND_INTERVAL && lastSent !== 0) {
        const left = Math.round((SEND_INTERVAL - (now - lastSent)) / 1000);
        document.getElementById('recStatus').innerHTML = `
          <div class="badge bg">🟢 Jonli kuzatuv • ${trackCount} ta yuborildi</div>
          <div style="margin-top:8px;font-size:11px;color:var(--muted);">⏱️ Keyingi yangilanish: ${left}s</div>
        `;
        return;
      }
      lastSent = now;
      await sendToServer(pos);
    },
    err => {
      let m = 'GPS ruxsati berilmadi';
      if (err.code === 2) m = 'GPS aniqlanmadi';
      if (err.code === 3) m = 'GPS vaqt tugadi';
      document.getElementById('recStatus').innerHTML = `<span class="badge br">❌ ${m}</span>`;
      stopTracking();
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 20000 }
  );
}

function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  document.getElementById('startBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('recIcon').textContent = '📍';
  document.getElementById('recStatus').innerHTML = '<span class="badge br">⏹️ Kuzatuv to\'xtatildi</span>';
}

async function sendToServer(pos) {
  const data = {
    id: 'L' + Date.now(),
    lat: pos.coords.latitude,
    lng: pos.coords.longitude,
    accuracy: Math.round(pos.coords.accuracy),
    sender: SENDER_NAME(),
    time: new Date().toISOString(),
    address: '',
    live: true
  };

  try {
    const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${data.lat}&lon=${data.lng}&format=json&accept-language=uz`);
    const gd = await geo.json();
    const a = gd.address || {};
    data.address = [a.city||a.town||a.village||a.county||'', a.state||a.province||'', a.country||''].filter(Boolean).join(', ');
  } catch {}

  try {
    const r = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
    const d = await r.json();
    let locs = d.record.locations || [];
    locs = locs.filter(l => !(l.live && l.sender === data.sender));
    locs.push(data);
    if (locs.length > 200) locs.splice(0, locs.length - 200);

    await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ locations: locs })
    });

    trackCount++;
    const t = new Date().toLocaleTimeString('uz-UZ', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('recStatus').innerHTML = `
      <div class="badge bg" style="margin-bottom:8px;">🟢 Jonli • ${trackCount} marta yangilandi</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.8;margin-top:8px;">
        📍 ${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}<br>
        ${data.address ? `🏙️ ${data.address}<br>` : ''}
        🎯 Aniqlik: ±${data.accuracy}m<br>
        🕐 ${t}
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--muted);">Sahifa ochiq turguncha yangilanadi</div>
    `;
  } catch {
    document.getElementById('recStatus').innerHTML = '<span class="badge br">❌ Internet yo\'q, qayta urinilmoqda...</span>';
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Auto refresh 20s
setInterval(() => { if (document.getElementById('ownerPanel').style.display !== 'none') loadLocs(); }, 20000);

init();
</script>
</body>
</html>
